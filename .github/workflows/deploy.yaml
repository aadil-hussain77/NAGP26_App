name: CI/CD

"on":
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_method:
        description: "Deployment method: helm or k8s"
        required: true
        default: "helm"
        type: choice
        options:
          - helm
          - k8s

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          pull: true
          no-cache: true
          tags: |
            aadil77/nagp26-app:latest
            aadil77/nagp26-app:${{ github.sha }}

      # Authenticate to GCP using Workload Identity (OIDC) - no JSON key
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Set up Gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          export_default_credentials: true

      - name: Validate GCP inputs
        run: |
          echo "Validating required GCP inputs..."
          if [ -z "${{ secrets.GCP_PROJECT }}" ]; then echo "ERROR: GCP_PROJECT secret is empty" && exit 1; fi
          if [ -z "${{ secrets.GKE_CLUSTER }}" ]; then echo "ERROR: GKE_CLUSTER secret is empty" && exit 1; fi
          if [ -z "${{ secrets.GKE_ZONE }}" ]; then echo "ERROR: GKE_ZONE secret is empty" && exit 1; fi
          echo "gcloud configured project: $(gcloud config get-value project 2>/dev/null || echo '<none>')"
          echo "Listing GKE clusters in project/zone for quick verification..."
          gcloud container clusters list --project="${{ secrets.GCP_PROJECT }}" --zone="${{ secrets.GKE_ZONE }}" || true

      - name: Configure kubectl
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Prepare Helm release resources
        run: |
          echo "Preparing Helm resources for release 'nagp26' in namespace 'nagp26'..."
          if kubectl get namespace nagp26 >/dev/null 2>&1; then
            if kubectl get secret sql-credentials -n nagp26 >/dev/null 2>&1; then
              echo "Found existing secret 'sql-credentials' - checking Helm metadata..."
              managed_by=$(kubectl get secret sql-credentials -n nagp26 -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}' 2>/dev/null || true)
              release_name=$(kubectl get secret sql-credentials -n nagp26 -o jsonpath='{.metadata.annotations.meta\.helm\.sh/release-name}' 2>/dev/null || true)
              release_ns=$(kubectl get secret sql-credentials -n nagp26 -o jsonpath='{.metadata.annotations.meta\.helm\.sh/release-namespace}' 2>/dev/null || true)
              echo "labels.managed-by=$managed_by release-name=$release_name release-namespace=$release_ns"
              if [ "$managed_by" != "Helm" ] || [ "$release_name" != "nagp26" ] || [ "$release_ns" != "nagp26" ]; then
                echo "Secret exists but is not managed by Helm for this release - deleting so Helm can create it"
                kubectl delete secret sql-credentials -n nagp26 || true
              else
                echo "Secret is already managed by Helm release 'nagp26' - leaving in place"
              fi
            else
              echo "No existing 'sql-credentials' secret found - OK (Helm will create it)"
            fi
          else
            echo "Namespace 'nagp26' not present - OK (Helm will create namespace and secret)"
          fi

      - name: Cleanup old db-init jobs
        if: ${{ github.event_name == 'push' || inputs.deploy_method == 'helm' }}
        run: |
          kubectl delete jobs -n nagp26 -l app=db-init --ignore-not-found
          kubectl delete job db-init-job -n nagp26 --ignore-not-found

      - name: Deploy (Helm)
        if: ${{ github.event_name == 'push' || inputs.deploy_method == 'helm' }}
        run: |
          helm upgrade --install nagp26 ./helm/nagp26-api \
            --namespace nagp26 --create-namespace \
            --wait --timeout 10m \
            --set image.repository=aadil77/nagp26-app \
            --set image.tag=${{ github.sha }} \
            --set sql.saUser='sa' \
            --set sql.saPassword='${{ secrets.SQL_DB_PASSWORD }}' \
            --set sql.appUser='${{ secrets.SQL_DB_USER }}' \
            --set sql.appPassword='${{ secrets.SQL_DB_PASSWORD }}'

      - name: Wait for db-init job (non-blocking on failure)
        if: ${{ github.event_name == 'push' || inputs.deploy_method == 'helm' }}
        run: |
          REV=$(helm -n nagp26 history nagp26 --max 1 -o json | jq -r '.[0].revision')
          echo "Waiting for db-init-job-${REV}..."
          kubectl wait --for=condition=complete job/db-init-job-${REV} -n nagp26 --timeout=8m || \
            echo "db-init job did not complete in time (API may still work if DB was initialized earlier)"

      - name: Prepare K8s resources (namespace + secret)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_method == 'k8s' }}
        run: |
          echo "Ensuring namespace 'nagp26' exists for k8s deploy..."
          kubectl create namespace nagp26 --dry-run=client -o yaml | kubectl apply -f -
          echo "Creating/updating sql-credentials secret for k8s deploy..."
          kubectl -n nagp26 create secret generic sql-credentials \
            --from-literal=DB_USER='${{ secrets.SQL_DB_USER }}' \
            --from-literal=DB_PASSWORD='${{ secrets.SQL_DB_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy (Raw Kubernetes YAML)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_method == 'k8s' }}
        run: |
          kubectl apply -f k8s/
