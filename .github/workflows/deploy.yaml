name: CI/CD

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      deploy_method:
        description: "Deployment method: helm or k8s"
        required: true
        default: "helm"
        type: choice
        options:
          - helm
          - k8s

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: aadil77/nagp26-app:latest

      # Authenticate to GCP using Workload Identity (OIDC) - no JSON key
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Set up Gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          export_default_credentials: true

      - name: Configure kubectl
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Create/Update DB credentials secret (Kubernetes)
        run: |
          kubectl -n nagp26 create secret generic sql-credentials \
            --from-literal=DB_USER='${{ secrets.SQL_DB_USER }}' \
            --from-literal=DB_PASSWORD='${{ secrets.SQL_DB_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy (Helm)
        if: ${{ github.event_name == 'push' || inputs.deploy_method == 'helm' }}
        run: |
          helm upgrade --install nagp26 ./helm/nagp26-api \
            --namespace nagp26 --create-namespace \
            --set image.repository=aadil77/nagp26-app \
            --set image.tag=latest \
            --set sql.saUser='${{ secrets.SQL_DB_USER }}' \
            --set sql.saPassword='${{ secrets.SQL_DB_PASSWORD }}'

      - name: Deploy (Raw Kubernetes YAML)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_method == 'k8s' }}
        run: |
          kubectl apply -f k8s/
