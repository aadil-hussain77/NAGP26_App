apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nagp26-api-hpa
  namespace: nagp26
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nagp26-api
  minReplicas: 4
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
