apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-allow-api
  namespace: nagp26
spec:
  podSelector:
    matchLabels:
      app: nagp26-sql
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: nagp26-api
        - podSelector:
            matchLabels:
              app: db-init
      ports:
        - protocol: TCP
          port: 1433
  policyTypes:
    - Ingress
