apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nagp26-sql
  namespace: nagp26
spec:
  serviceName: "nagp26-sql"
  replicas: 1
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app: nagp26-sql
  template:
    metadata:
      labels:
        app: nagp26-sql
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mssql
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - containerPort: 1433
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: "Express"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: DB_PASSWORD
            - name: MSSQL_TCP_PORT
              value: "1433"
          volumeMounts:
            - name: mssqldata
              mountPath: /var/opt/mssql
          readinessProbe:
            tcpSocket:
              port: 1433
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 1433
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
  volumeClaimTemplates:
    - metadata:
        name: mssqldata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi
