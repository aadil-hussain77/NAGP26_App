{{- if .Values.sql.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mssql-backup
spec:
  schedule: "{{ .Values.sql.backup.schedule }}"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: mssql-backup
              image: {{ .Values.sql.backup.image | quote }}
              env:
                - name: DB_HOST
                  value: "nagp26-sql"
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: sql-credentials
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: sql-credentials
                      key: DB_PASSWORD
                - name: GCS_BUCKET
                  value: {{ .Values.sql.backup.gcsBucket | quote }}
          restartPolicy: OnFailure
{{- end }}
