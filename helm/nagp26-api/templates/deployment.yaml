apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nagp26-api.fullname" . }}
  labels:
    app: {{ include "nagp26-api.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ include "nagp26-api.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "nagp26-api.name" . }}
    spec:
      containers:
        - name: nagp26-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: DB_SERVER
              value: "nagp26-sql"
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/employees
              port: {{ .Values.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/employees
              port: {{ .Values.service.port }}
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
