{{- if .Values.initJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: db-init-job-{{ .Release.Revision }}
  labels:
    app: db-init
spec:
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: db-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: mcr.microsoft.com/mssql-tools
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          command: ["/bin/sh","-c"]
          args:
            - |
              set -eu

              DB_NAME="{{ .Values.sql.dbName }}"
              DB_USER="{{ .Values.sql.appUser }}"
              DB_PASSWORD="{{ .Values.sql.appPassword }}"
              SA_PASSWORD="{{ .Values.sql.saPassword }}"
              SQL_HOST="nagp26-sql.nagp26.svc.cluster.local"

              if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then
                SQLCMD=/opt/mssql-tools18/bin/sqlcmd
              elif [ -x /opt/mssql-tools/bin/sqlcmd ]; then
                SQLCMD=/opt/mssql-tools/bin/sqlcmd
              else
                echo "sqlcmd not found"
                exit 1
              fi

              SQL_READY=0
              for i in $(seq 1 90); do
                if $SQLCMD -S "$SQL_HOST" -U "sa" -P "$SA_PASSWORD" -C -Q "SELECT 1" >/dev/null 2>&1; then
                  echo "sql is ready"
                  SQL_READY=1
                  break
                fi
                echo "waiting for sql (attempt $i)"
                sleep 10
              done

              if [ "$SQL_READY" -ne 1 ]; then
                echo "sql never became ready - last error:"
                $SQLCMD -S "$SQL_HOST" -U "sa" -P "$SA_PASSWORD" -C -Q "SELECT 1" || true
                exit 1
              fi

              sleep 10

              echo "running init.sql..."
              DB_PASSWORD_SQL=$(printf "%s" "$DB_PASSWORD" | sed "s/'/''/g")
              sed \
                -e "s/__DB_NAME__/${DB_NAME}/g" \
                -e "s/__DB_USER__/${DB_USER}/g" \
                -e "s/__DB_PASSWORD__/${DB_PASSWORD_SQL}/g" \
                /opt/init/init.sql > /tmp/init.sql

              $SQLCMD -S "$SQL_HOST" -U "sa" -P "$SA_PASSWORD" -C -b -i /tmp/init.sql

              echo "db init completed"

          env:
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: DB_PASSWORD
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: SA_PASSWORD

          volumeMounts:
            - name: init-sql
              mountPath: /opt/init
              readOnly: true

      volumes:
        - name: init-sql
          configMap:
            name: db-init-sql
{{- end }}