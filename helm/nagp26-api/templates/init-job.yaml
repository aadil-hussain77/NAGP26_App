{{- if .Values.initJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: db-init-job-{{ .Release.Revision }}
  labels:
    app: db-init
spec:
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: db-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: mcr.microsoft.com/mssql-tools
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          command: ["/bin/sh","-c"]
          args:
            - /scripts/db-init.sh
          env:
            - name: DB_NAME
              value: "{{ .Values.sql.dbName }}"
            - name: DB_USER
              value: "{{ .Values.sql.appUser }}"
            - name: DB_PASSWORD
              value: "{{ .Values.sql.appPassword }}"
            - name: SA_PASSWORD
              value: "{{ .Values.sql.saPassword }}"
            - name: SQL_HOST
              value: "{{ .Values.sql.host | default "nagp26-sql.nagp26.svc.cluster.local" }}"
          volumeMounts:
            - name: db-init-script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: db-init-script
          configMap:
            name: db-init-script-{{ .Release.Name }}-{{ .Release.Revision }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
{{- end }}