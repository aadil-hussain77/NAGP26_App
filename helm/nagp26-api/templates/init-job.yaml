{{- if .Values.initJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: db-init-job
spec:
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: mcr.microsoft.com/mssql-tools
          command: ["/bin/sh","-c"]
          args:
            - |
              for i in $(seq 1 60); do
                /opt/mssql-tools18/bin/sqlcmd -S "nagp26-sql" -U "sa" -P "$SA_PASSWORD" -C -Q "SELECT 1" >/dev/null 2>&1 && break
                echo waiting for sql
                sleep 5
              done
              /opt/mssql-tools18/bin/sqlcmd -S "nagp26-sql" -U "sa" -P "$SA_PASSWORD" -C -b -Q "
              IF DB_ID('${DB_NAME}') IS NULL BEGIN
                EXEC('CREATE DATABASE [' + '${DB_NAME}' + ']');
              END;
              USE [${DB_NAME}];
              IF NOT EXISTS (SELECT 1 FROM sys.sql_logins WHERE name = '${DB_USER}') BEGIN
                EXEC('CREATE LOGIN [' + '${DB_USER}' + '] WITH PASSWORD = ''' + '${DB_PASSWORD}' + '''');
              END;
              IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = '${DB_USER}') BEGIN
                EXEC('CREATE USER [' + '${DB_USER}' + '] FOR LOGIN [' + '${DB_USER}' + ']');
              END;
              EXEC('ALTER ROLE db_owner ADD MEMBER [' + '${DB_USER}' + ']');
              IF OBJECT_ID('dbo.Employees', 'U') IS NULL BEGIN
                CREATE TABLE dbo.Employees (
                  EmployeeId BIGINT IDENTITY(1,1) NOT NULL PRIMARY KEY,
                  EmployeeCode NVARCHAR(20) NOT NULL,
                  FirstName NVARCHAR(100) NOT NULL,
                  LastName NVARCHAR(100) NOT NULL,
                  Email NVARCHAR(255) NOT NULL,
                  ContactNo NVARCHAR(15) NOT NULL,
                  Department NVARCHAR(100) NOT NULL,
                  Designation NVARCHAR(100) NOT NULL,
                  IsActive BIT NOT NULL,
                  CreatedAt DATETIME2 NOT NULL DEFAULT SYSUTCDATETIME(),
                  UpdatedAt DATETIME2 NOT NULL DEFAULT SYSUTCDATETIME(),
                  RowVersion ROWVERSION NOT NULL
                );
                CREATE UNIQUE INDEX IX_Employees_EmployeeCode ON dbo.Employees(EmployeeCode);
                CREATE UNIQUE INDEX IX_Employees_Email ON dbo.Employees(Email);
              END;
              IF NOT EXISTS (SELECT 1 FROM dbo.Employees) BEGIN
                INSERT INTO dbo.Employees (EmployeeCode, FirstName, LastName, Email, ContactNo, Department, Designation, IsActive)
                VALUES
                  ('E001','Aadil','Hussain','aadil@example.com','9999999991','Engineering','Developer',1),
                  ('E002','John','Doe','john.doe@example.com','9999999992','Sales','Executive',1),
                  ('E003','Jane','Smith','jane.smith@example.com','9999999993','HR','Specialist',1),
                  ('E004','Ravi','Kumar','ravi.kumar@example.com','9999999994','Finance','Analyst',1),
                  ('E005','Neha','Sharma','neha.sharma@example.com','9999999995','Support','Engineer',1);
              END;
              "
          env:
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: DB_PASSWORD
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: SA_PASSWORD
{{- end }}
