replicaCount: 4
image:
  repository: aadil77/nagp26-app
  tag: latest
  pullPolicy: Always

service:
  # Use NodePort so GCE Ingress will be able to provision the LB
  type: NodePort
  port: 8080
  # Optional: set a fixed nodePort (null -> k8s picks one)
  nodePort: null
  annotations:
    # keep NEG annotation if you want NEG features; optional
    cloud.google.com/neg: '{"ingress":true}'

ingress:
  enabled: true
  className: gce
  annotations:
    # ensure ingress class annotation exists
    kubernetes.io/ingress.class: "gce"
  host: null

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

sql:
  enabled: true
  image: mcr.microsoft.com/mssql/server:2022-latest
  storage:
    size: 10Gi
    storageClass: standard
    maxPool: "100"
    minPool: "0"
  saUser: sa
  # SA password should be provided via GitHub Secrets (pipeline injects it)
  saPassword: "REPLACE_ME"
  # Application DB login (pipeline injects it)
  appUser: "nagpuser"
  appPassword: "REPLACE_ME"
  dbName: "NAGP26_DB"
  init:
    enabled: true
  backup:
    enabled: false
    schedule: "0 2 * * *"
    image: myorg/mssql-backup:latest
    gcsBucket: my-backups-bucket

initJob:
  enabled: true

hpa:
  enabled: true
  minReplicas: 4
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50
