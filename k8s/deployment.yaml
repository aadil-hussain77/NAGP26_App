apiVersion: apps/v1
kind: Deployment
metadata:
  name: nagp26-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nagp26-app
  template:
    metadata:
      labels:
        app: nagp26-app
    spec:
      containers:
        - name: nagp26-app
          image: nagp26_app:latest
          ports:
            - containerPort: 80
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:80"
            - name: DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: sql-conn
                  key: connectionString
          readinessProbe:
            httpGet:
              path: /api/employees
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/employees
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: nagp26-app
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: nagp26-app
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nagp26-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nagp26-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50