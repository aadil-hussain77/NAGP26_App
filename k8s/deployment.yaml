apiVersion: apps/v1
kind: Deployment
metadata:
  name: nagp26-app
  namespace: nagp26
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nagp26-app
  template:
    metadata:
      labels:
        app: nagp26-app
    spec:
      containers:
        - name: nagp26-app
          image: aadil77/nagp26-app:latest
          ports:
            - containerPort: 80
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:80"
            - name: DB_SERVER
              valueFrom:
                configMapKeyRef:
                  name: api-db-config
                  key: DB_SERVER
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: api-db-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/employees
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/employees
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nagp26-app
  namespace: nagp26
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: nagp26-app
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nagp26-app-hpa
  namespace: nagp26
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nagp26-app
  minReplicas: 4
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50