apiVersion: v1
kind: Secret
metadata:
  name: sql-credentials
  namespace: nagp26
type: Opaque
stringData:
  # Do NOT commit a real password in any YAML. Create this Secret at deploy time.
  DB_USER: "<SET_AT_DEPLOY_TIME>"
  DB_PASSWORD: "<SET_AT_DEPLOY_TIME>"
  SA_PASSWORD: "<SET_AT_DEPLOY_TIME>"

