apiVersion: apps/v1
kind: Deployment
metadata:
  name: nagp26-sql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nagp26-sql
  template:
    metadata:
      labels:
        app: nagp26-sql
    spec:
      containers:
        - name: mssql
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - containerPort: 1433
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: sa-password
          volumeMounts:
            - name: mssqldata
              mountPath: /var/opt/mssql
      volumes:
        - name: mssqldata
          persistentVolumeClaim:
            claimName: mssqldata-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nagp26-sql
spec:
  type: ClusterIP
  ports:
    - port: 1433
      targetPort: 1433
  selector:
    app: nagp26-sql
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mssqldata-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi